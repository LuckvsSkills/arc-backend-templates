version: '3.9'

services:
  api:
    build: .
    container_name: {{SITE_NAAM}}_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - database
      - redis
    networks:
      - content_netwerk

  database:
    image: postgres:15-alpine
    container_name: {{SITE_NAAM}}_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: content_db
      POSTGRES_USER: ${DB_GEBRUIKER}
      POSTGRES_PASSWORD: ${DB_WACHTWOORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - content_netwerk

  redis:
    image: redis:7-alpine
    container_name: {{SITE_NAAM}}_cache
    restart: unless-stopped
    networks:
      - content_netwerk

volumes:
  postgres_data:

networks:
  content_netwerk:
    driver: bridge
