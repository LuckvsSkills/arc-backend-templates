version: '3.9'

services:
  api:
    build: .
    container_name: {{PLATFORM_PREFIX}}_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - database
      - redis
    networks:
      - saas_netwerk

  database:
    image: postgres:15-alpine
    container_name: {{PLATFORM_PREFIX}}_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas_db
      POSTGRES_USER: ${DB_GEBRUIKER}
      POSTGRES_PASSWORD: ${DB_WACHTWOORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - saas_netwerk

  redis:
    image: redis:7-alpine
    container_name: {{PLATFORM_PREFIX}}_cache
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - saas_netwerk

volumes:
  postgres_data:
  redis_data:

networks:
  saas_netwerk:
    driver: bridge
